<script>

// ============================================================
// Max / Min value display plugin
// 最高・最低値表示プラグイン
// ============================================================
const maxMinLabelPlugin = {
  id: "maxMinLabel",

  afterDraw(chart, args, options) {
    if (!options) return;

    const ctx = chart.ctx;
    const chartArea = chart.chartArea;

    ctx.save();

    const isMobile = window.matchMedia("(max-width: 600px)").matches;

    ctx.font = isMobile
      ? "bold 10px Consolas"
      : "bold 16px Consolas";

    ctx.textAlign = "left";
    ctx.textBaseline = "top";

    const x = isMobile
      ? chartArea.right - 70
      : chartArea.right - 120;

    let y = chartArea.top + 10;

    const lineStep = isMobile ? 11 : 18;
    const blockGap = isMobile ? 11 : 18;
    const valueX = isMobile ? x + 28 : x + 37;
    // ==============================
    // Temperature graph: Sun + Shade + Indoor
    // 気温グラフ：日向 + 日陰 + 室温
    // ==============================
    if (
      options.sunMax !== undefined &&
      options.sunMin !== undefined &&
      options.shadeMax !== undefined &&
      options.shadeMin !== undefined &&
      options.indoorTempMax !== undefined &&
      options.indoorTempMin !== undefined
    ) {

      // Sun Temp
      // 日向温度
      ctx.fillStyle = "#ff6384";

      ctx.fillText("MAX:", x, y);
      ctx.fillText(options.sunMax + "°C", valueX, y);

      y += lineStep;

      ctx.fillText("MIN:", x, y);
      ctx.fillText(options.sunMin + "°C", valueX, y);

      y += blockGap;

      // Shade Temp
      // 日陰温度
      ctx.fillStyle = "#36a2eb";

      ctx.fillText("MAX:", x, y);
      ctx.fillText(options.shadeMax + "°C", valueX, y);

      y += lineStep;

      ctx.fillText("MIN:", x, y);
      ctx.fillText(options.shadeMin + "°C", valueX, y);

      y += blockGap;

      // Indoor Temp
      // 室温
      ctx.fillStyle = "#66ff66";

      ctx.fillText("MAX:", x, y);
      ctx.fillText(options.indoorTempMax + "°C", valueX, y);

      y += lineStep;

      ctx.fillText("MIN:", x, y);
      ctx.fillText(options.indoorTempMin + "°C", valueX, y);

      ctx.restore();
      return;
    }

    // ==============================
    // Humidity graph: Outdoor + Indoor
    // 湿度グラフ：屋外 + 室内
    // ==============================
    if (
      options.outdoorMax !== undefined &&
      options.outdoorMin !== undefined &&
      options.indoorMax !== undefined &&
      options.indoorMin !== undefined
    ) {

      // Outdoor humidity
      // 屋外湿度
      ctx.fillStyle = options.outdoorColor;

      ctx.fillText("MAX:", x, y);
      ctx.fillText(options.outdoorMax + options.unit, valueX, y);

      y += lineStep;

      ctx.fillText("MIN:", x, y);
      ctx.fillText(options.outdoorMin + options.unit, valueX, y);

      y += blockGap;

      // Indoor humidity
      // 室内湿度
      ctx.fillStyle = options.indoorColor;

      ctx.fillText("MAX:", x, y);
      ctx.fillText(options.indoorMax + options.unit, valueX, y);

      y += lineStep;

      ctx.fillText("MIN:", x, y);
      ctx.fillText(options.indoorMin + options.unit, valueX, y);

      ctx.restore();
      return;
    }

    // ==============================
    // Humidity / Pressure graph
    // 湿度・気圧グラフ
    // ==============================
    if (
      options.maxValue !== undefined &&
      options.minValue !== undefined &&
      options.unit !== undefined &&
      options.color !== undefined
    ) {
    ctx.fillStyle = options.color;
    
    ctx.fillText(
      "MAX " + String(options.maxValue).padStart(5, " ") + options.unit,
      x,
      y
    );
    
    y += lineStep;
    
    ctx.fillText(
      "MIN " + String(options.minValue).padStart(5, " ") + options.unit,
      x,
      y
    );

    }

    ctx.restore();
  }
};

Chart.register(maxMinLabelPlugin);

// ============================================================
// Global chart object
// グローバルグラフオブジェクト
// ------------------------------------------------------------
// Stores Chart.js instance
// Chart.js インスタンスを保持
// ============================================================
let weatherChart = null;


// ============================================================
// Current chart mode
// 現在のグラフモード
// ------------------------------------------------------------
// "main"     = temperature graph
// "humidity" = humidity graph
// "pressure" = pressure graph
//
// "main"     = 温度グラフ
// "humidity" = 湿度グラフ
// "pressure" = 気圧グラフ
// ============================================================
let chartMode = "main";


// ============================================================
// Graph data arrays
// グラフデータ配列
// ------------------------------------------------------------
// lastLabels    = time labels
// lastShade     = shade temperature
// lastSun       = sun temperature
// lastHumidity  = humidity
// lastPressure  = pressure
//
// lastLabels    = 時刻ラベル
// lastShade     = 日陰温度
// lastSun       = 日向温度
// lastHumidity  = 湿度
// lastPressure  = 気圧
// lastIndoorTemp = エアコン室内温度
// lastIndoorHumidity = エアコン室内湿度
// ============================================================
let lastLabels = [];

let lastShade = [];

let lastSun = [];

let lastHumidity = [];

let lastPressure = [];

let lastIndoorTemp = [];

let lastIndoorHumidity = [];


// ============================================================
// Load latest sensor values
// 最新センサー値取得
// ------------------------------------------------------------
// Reads data.json from server
// サーバーの data.json を読み込む
//
// "?ts=" prevents browser cache
// "?ts=" はブラウザーキャッシュ防止
// ============================================================
function loadLatest() {

  fetch("data.json?ts=" + new Date().getTime())

    .then(response => response.json())

    .then(data => {

      document.getElementById("shade_temp").textContent =
        data.shade_temp;

      document.getElementById("sun_temp").textContent =
        data.sun_temp;

      document.getElementById("humidity").textContent =
        data.humidity;

      document.getElementById("pressure").textContent =
        data.pressure;

      // ======================================================
      // Load indoor latest data
      // 室内最新データ読み込み
      // ======================================================
      fetch("indoor.json?ts=" + new Date().getTime())

        .then(response => response.json())

        .then(indoor => {

          document.getElementById("indoor_temp").textContent =
            indoor.shade_temp;

          document.getElementById("indoor_humidity").textContent =
            indoor.humidity;

          // ==================================================
          // Discomfort Index
          // 不快指数
          // ==================================================
          const outdoorTemp = parseFloat(data.shade_temp);
          //*** const outdoorTemp = parseFloat(data.sun_temp);  // 屋根の上のセンサーによる不快指数
          const outdoorHum  = parseFloat(data.humidity);

          const indoorTempVal = parseFloat(indoor.shade_temp);
          const indoorHumVal  = parseFloat(indoor.humidity);

          const outdoorDI =
            0.81 * outdoorTemp +
            0.01 * outdoorHum * (0.99 * outdoorTemp - 14.3) +
            46.3;

          const indoorDI =
            0.81 * indoorTempVal +
            0.01 * indoorHumVal * (0.99 * indoorTempVal - 14.3) +
            46.3;

          document.getElementById("discomfort").textContent =
            outdoorDI.toFixed(0);

          document.getElementById("indoor_di").textContent =
            indoorDI.toFixed(0);

          document.getElementById("discomfort").style.color =
            getDiscomfortColor(outdoorDI);

          document.getElementById("indoor_di").style.color =
            getDiscomfortColor(indoorDI);
        });
    });
}

// ==========================================================
// Discomfort Index Color
// 不快指数色判定
// ==========================================================
function getDiscomfortColor(di)
{
  if (di <= 70) {
    return "#66ff66";
  }

  if (di <= 75) {
    return "#ffff66";
  }

  if (di <= 80) {
    return "#ff9933";
  }

  return "#ff4444";
}

function getDiscomfortColor(di) {
  if (di <= 70) return "#66ff66";
  if (di <= 75) return "#ffff66";
  if (di <= 80) return "#ff9933";
  return "#ff4444";
}

// ============================================================
// Update clock display
// 時計表示更新
// ------------------------------------------------------------
// Gets current local time from browser
// ブラウザーから現在時刻を取得
//
// Display format:
// 表示形式:
//
// YYYY-MM-DD HH:MM
// ============================================================
function updateClock() {

  // ==========================================================
  // Get current date/time
  // 現在日時取得
  // ==========================================================
  const now = new Date();


  // ==========================================================
  // Year
  // 年
  // ==========================================================
  const y = now.getFullYear();


  // ==========================================================
  // Month
  // 月
  // ----------------------------------------------------------
  // getMonth() returns 0-11
  // getMonth() は 0-11 を返すため +1
  //
  // padStart(2,'0')
  // Add leading zero
  // 先頭ゼロ追加
  // ==========================================================
  const mo = String(now.getMonth() + 1).padStart(2, '0');


  // ==========================================================
  // Day
  // 日
  // ==========================================================
  const d = String(now.getDate()).padStart(2, '0');


  // ==========================================================
  // Hour
  // 時
  // ==========================================================
  const h = String(now.getHours()).padStart(2, '0');


  // ==========================================================
  // Minute
  // 分
  // ==========================================================
  const mi = String(now.getMinutes()).padStart(2, '0');


  // ==========================================================
  // Update clock text
  // 時計表示更新
  // ==========================================================
  document.getElementById("timeText").textContent =

    `${y}-${mo}-${d} ${h}:${mi}`;
}

// ============================================================
// Load history data from CSV
// CSV履歴データ読み込み
// ------------------------------------------------------------
// Reads history.csv and converts it to graph data arrays
// history.csv を読み込み、グラフ用配列へ変換する
//
// Graph X-axis is fixed to 24 hours
// グラフのX軸は24時間固定
//
// Data interval:
// データ間隔:
//
// 10 minutes
// 10分間隔
// ============================================================
function loadHistory() {

  fetch("history.csv?ts=" + Date.now(), { cache: "no-store" })

    .then(response => response.text())

    .then(text => {

      const lines = text.trim().split("\n");

      // Remove header line
      // ヘッダー行を削除
      lines.shift();

      const labels = [];
      const shade = [];
      const sun = [];
      const humidity = [];
      const pressure = [];
      // Indoor temperature / 室温
      const indoorTemp = [];   
      // Indoor humidity
      // 室内湿度
      const indoorHumidity = [];

      // ======================================================
      // Create fixed 24-hour labels
      // 24時間固定ラベル作成
      // ======================================================
      for (let h = 0; h < 24; h++) {

        for (let m = 0; m < 60; m += 10) {

          const labelHour = String(h).padStart(2, "0");
          const labelMin  = String(m).padStart(2, "0");

          labels.push(`${labelHour}:${labelMin}`);

          shade.push(null);
          sun.push(null);
          humidity.push(null);
          pressure.push(null);
          indoorTemp.push(null);
          indoorHumidity.push(null);
        }
      }

      // ======================================================
      // Get selected day offset
      // 表示する日付のオフセット取得
      // 0 = today, 1 = yesterday, ... 30 = 30 days ago
      // 0 = 今日, 1 = 昨日, ... 30 = 30日前
      // ======================================================
      const offsetInput = document.getElementById("dayOffset");

      let dayOffset = 0;

      if (offsetInput) {
        dayOffset = parseInt(offsetInput.value, 10);

        if (isNaN(dayOffset)) {
          dayOffset = 0;
        }

        if (dayOffset < 0) {
          dayOffset = 0;
        }

        if (dayOffset > 30) {
          dayOffset = 30;
        }

        offsetInput.value = dayOffset;
      }

      const targetDate = new Date();

      targetDate.setHours(0, 0, 0, 0);
      targetDate.setDate(targetDate.getDate() - dayOffset);

      // ======================================================
      // Process each CSV line
      // CSV各行を処理
      // ======================================================
      lines.forEach(line => {

        if (!line.trim()) return;

        const cols = line.trim().split(",");

        // CSV:
        // 0 = date
        // 1 = time
        // 2 = shade_temp
        // 3 = sun_temp
        // 4 = humidity
        // 5 = pressure
        if (cols.length < 6) return;

        const dateStr = cols[0].trim();
        const timeStr = cols[1].trim();

        const dateParts = dateStr.replace(/-/g, "/").split("/");
        const timeParts = timeStr.split(":");

        if (dateParts.length < 3) return;
        if (timeParts.length < 2) return;

        const year  = parseInt(dateParts[0], 10);
        const month = parseInt(dateParts[1], 10) - 1;
        const day   = parseInt(dateParts[2], 10);

        const hour   = parseInt(timeParts[0], 10);
        const minute = parseInt(timeParts[1], 10);

        const dateObj = new Date(year, month, day, hour, minute, 0);

        if (isNaN(dateObj.getTime())) return;

        // ====================================================
        // Show selected day's data only
        // 選択日のデータだけ表示
        // ====================================================
        if (
          dateObj.getFullYear() !== targetDate.getFullYear() ||
          dateObj.getMonth() !== targetDate.getMonth() ||
          dateObj.getDate() !== targetDate.getDate()
        ) {
          return;
        }

        // ====================================================
        // Round time to nearest 10 minutes
        // 時刻を10分単位に丸める
        // ====================================================
        const labelDate = new Date(dateObj);

        let roundedMin = Math.round(labelDate.getMinutes() / 10) * 10;

        if (roundedMin >= 60) {
          labelDate.setHours(labelDate.getHours() + 1);
          roundedMin = 0;
        }

        labelDate.setMinutes(roundedMin, 0, 0);

        const index =
          labelDate.getHours() * 6 + (roundedMin / 10);

        if (index < 0 || index >= labels.length) return;

        shade[index]    = parseFloat(cols[2]);
        sun[index]      = parseFloat(cols[3]);
        humidity[index] = parseFloat(cols[4]);
        pressure[index] = parseFloat(cols[5]);
      });

      lastLabels = labels;
      lastShade = shade;
      lastSun = sun;
      lastHumidity = humidity;
      lastPressure = pressure;
      
      // ======================================================
      // Load indoor temperature history
      // 室温履歴を読み込む
      // ======================================================
      fetch("history_indoor.csv?ts=" + Date.now(), { cache: "no-store" })
      
        .then(response => response.text())
      
        .then(indoorText => {
      
          const indoorLines = indoorText.trim().split("\n");
      
          // Remove header line
          // ヘッダー行を削除
          indoorLines.shift();
      
          indoorLines.forEach(line => {
      
            if (!line.trim()) return;
      
            const cols = line.trim().split(",");
      
            // CSV:
            // 0 = date
            // 1 = time
            // 2 = indoor temperature
            // 3 = unused sun_temp
            // 4 = indoor humidity
            // 5 = pressure
            if (cols.length < 6) return;
      
            const dateStr = cols[0].trim();
            const timeStr = cols[1].trim();
      
            const dateParts = dateStr.replace(/-/g, "/").split("/");
            const timeParts = timeStr.split(":");
      
            if (dateParts.length < 3) return;
            if (timeParts.length < 2) return;
      
            const year  = parseInt(dateParts[0], 10);
            const month = parseInt(dateParts[1], 10) - 1;
            const day   = parseInt(dateParts[2], 10);
      
            const hour   = parseInt(timeParts[0], 10);
            const minute = parseInt(timeParts[1], 10);
      
            const dateObj = new Date(year, month, day, hour, minute, 0);
      
            if (isNaN(dateObj.getTime())) return;
      
            if (
              dateObj.getFullYear() !== targetDate.getFullYear() ||
              dateObj.getMonth() !== targetDate.getMonth() ||
              dateObj.getDate() !== targetDate.getDate()
            ) {
              return;
            }
      
            const labelDate = new Date(dateObj);
      
            let roundedMin = Math.round(labelDate.getMinutes() / 10) * 10;
      
            if (roundedMin >= 60) {
              labelDate.setHours(labelDate.getHours() + 1);
              roundedMin = 0;
            }
      
            labelDate.setMinutes(roundedMin, 0, 0);
      
            const index =
              labelDate.getHours() * 6 + (roundedMin / 10);
      
            if (index < 0 || index >= labels.length) return;
      
            // Indoor temperature
            // 室温
            indoorTemp[index] = parseFloat(cols[2]);
            // Indoor humidity
            // 室内湿度
            indoorHumidity[index] = parseFloat(cols[4]);
          });
      
          lastIndoorTemp = indoorTemp;
          lastIndoorHumidity = indoorHumidity;

          if (chartMode === "pressure") {
            drawPressureChart();
          } else if (chartMode === "humidity") {
            drawHumidityChart();
          } else if (chartMode === "id") {
            drawIdChart();
          } else {
            drawMainChart();
          }
        });
     });
}

// ============================================================
// Draw Discomfort Index chart
// 不快指数グラフ描画
// ------------------------------------------------------------
function drawIdChart() {

  // ==========================================================
  // Set current chart mode
  // 現在のグラフモード設定
  // ==========================================================
  chartMode = "id";

  // ==========================================================
  // Get canvas 2D context
  // canvas の 2D コンテキスト取得
  // ==========================================================
  const ctx =
    document.getElementById("weatherChart").getContext("2d");

  // ==========================================================
  // Destroy previous chart
  // 前回グラフ削除
  // ==========================================================
  if (weatherChart) {
    weatherChart.destroy();
  }

  // ==========================================================
  // Calculate Discomfort Index arrays
  // 不快指数配列を計算
  // ==========================================================
  const outdoorDi = [];
  const indoorDi = [];

  for (let i = 0; i < lastLabels.length; i++) {

    // Outdoor DI
    // 屋外不快指数
    if (
      lastShade[i] !== null &&
      lastHumidity[i] !== null &&
      !isNaN(lastShade[i]) &&
      !isNaN(lastHumidity[i])
    ) {
      const t = lastShade[i];
      //*** const t = lastSun[i];   // 屋根の上のセンサーによる不快指数
      const h = lastHumidity[i];

      outdoorDi[i] =
        0.81 * t +
        0.01 * h * (0.99 * t - 14.3) +
        46.3;
    } else {
      outdoorDi[i] = null;
    }

    // Indoor DI
    // 室内不快指数
    if (
      lastIndoorTemp[i] !== null &&
      lastIndoorHumidity[i] !== null &&
      !isNaN(lastIndoorTemp[i]) &&
      !isNaN(lastIndoorHumidity[i])
    ) {
      const t = lastIndoorTemp[i];
      const h = lastIndoorHumidity[i];

      indoorDi[i] =
        0.81 * t +
        0.01 * h * (0.99 * t - 14.3) +
        46.3;
    } else {
      indoorDi[i] = null;
    }
  }

  // ==========================================================
  // Calculate max/min DI
  // 不快指数の最高・最低を計算
  // ==========================================================
  const validOutdoorDi =
    outdoorDi.filter(v => v !== null && !isNaN(v));

  const validIndoorDi =
    indoorDi.filter(v => v !== null && !isNaN(v));

  const outdoorMax =
    validOutdoorDi.length ? Math.max(...validOutdoorDi).toFixed(0) : "--";

  const outdoorMin =
    validOutdoorDi.length ? Math.min(...validOutdoorDi).toFixed(0) : "--";

  const indoorMax =
    validIndoorDi.length ? Math.max(...validIndoorDi).toFixed(0) : "--";

  const indoorMin =
    validIndoorDi.length ? Math.min(...validIndoorDi).toFixed(0) : "--";

  // ==========================================================
  // Create Chart.js DI graph
  // Chart.js 不快指数グラフ生成
  // ==========================================================
  weatherChart = new Chart(ctx, {

    type: "line",

    data: {
      labels: lastLabels,

      datasets: [

        // ====================================================
        // Outdoor Discomfort Index
        // 屋外不快指数
        // ====================================================
        {
          label: "屋外不快指数",
          data: outdoorDi,
        
          borderColor: "#ff4444",
          backgroundColor: "#ff4444",
        
          segment: {
            borderColor: ctx => {
              const v = ctx.p1.parsed.y;
              return getDiscomfortColor(v);
            }
          },
        
          pointBackgroundColor: ctx => {
            const v = ctx.parsed.y;
            return getDiscomfortColor(v);
          },
        
          pointBorderColor: ctx => {
            const v = ctx.parsed.y;
            return getDiscomfortColor(v);
          },
          pointStyle: "circle",
          borderWidth: 2,
          tension: 0,
          yAxisID: "y",
        
          pointRadius: function(context) {
            const label = context.chart.data.labels[context.dataIndex];
        
            if (window.innerWidth <= 600) {
            
              const hour = parseInt(
                label.substring(0, 2),
                10
              );
            
              if (
                label.endsWith(":00") &&
                hour % 4 === 0
              ) {
                return 5;
              }
            
              return 0;
            }
        
            if (label.endsWith(":00")) {
              return 5;
            }
        
            return 0;
          },
        },
        // ====================================================
        // Indoor Discomfort Index
        // 室内不快指数
        // ====================================================
        {
          label: "室内不快指数",
          data: indoorDi,
        
          borderColor: "#66ff66",
          backgroundColor: "#66ff66",
        
          segment: {
            borderColor: ctx => {
              const v = ctx.p1.parsed.y;
              return getDiscomfortColor(v);
            }
          },
        
          pointBackgroundColor: ctx => {
            const v = ctx.parsed.y;
            return getDiscomfortColor(v);
          },
        
          pointBorderColor: ctx => {
            const v = ctx.parsed.y;
            return getDiscomfortColor(v);
          },
          pointStyle: "triangle",
          borderWidth: 2,
          tension: 0,
          yAxisID: "y",
        
          pointRadius: function(context) {
            const label = context.chart.data.labels[context.dataIndex];
        
            if (window.innerWidth <= 600) {
            
              const hour = parseInt(
                label.substring(0, 2),
                10
              );
            
              if (
                label.endsWith(":00") &&
                hour % 4 === 0
              ) {
                return 5;
              }
            
              return 0;
            }
            if (label.endsWith(":00")) {
              return 5;
            }
        
            return 0;
          },
        },
      ]
    },

    options: {

      responsive: true,

      maintainAspectRatio: false,

      spanGaps: false,

      plugins: {

        maxMinLabel: {
          outdoorMax: outdoorMax,
          outdoorMin: outdoorMin,
          indoorMax: indoorMax,
          indoorMin: indoorMin,
          unit: "",
          outdoorColor: "#ff4444",
          indoorColor: "#66ff66"
        },

            usePointStyle: true
          }

        // X-axis
        // X軸
        // ====================================================
        x: {
          ticks: {
            color: "white",
            autoSkip: false,

            callback: function(value, index) {

              const label = this.getLabelForValue(value);

              if (window.innerWidth <= 600) {
                const hour = parseInt(label.substring(0, 2), 10);

                if (label.endsWith(":00") && hour % 2 === 0) {
                  return label;
                }

                return "";
              }

              if (label.endsWith(":00")) {
                return label;
              }

              return "";
            }
          },

          grid: {
            color: function(context) {

              const label =
                context.chart.data.labels[context.index];

              if (label && label.endsWith(":00")) {
                return "#555";
              }

              return "rgba(0,0,0,0)";

        // ====================================================

          max: 90,

          },

          grid: {
            color: "#555"
          }
        },

        y1: {
          position: "right",

          min: 60,

          max: 90,

          ticks: {
            color: "white"
          },

          grid: {
            drawOnChartArea: false
          }
        }
      }
    }
  });
}

// ============================================================
// Draw pressure chart
// 気圧グラフ描画
// ------------------------------------------------------------
// Displays pressure history using Chart.js
// Chart.js を使用して気圧履歴を表示する
// ============================================================
function drawPressureChart() {

  // Current chart mode
  // 現在のグラフモード
  chartMode = "pressure";

  // Get canvas context
  // canvasコンテキスト取得
  const ctx = document.getElementById("weatherChart").getContext("2d");

  // Destroy previous chart
  // 前回グラフ削除
  if (weatherChart) {
    weatherChart.destroy();
  }

  // ====================================================
  // Auto pressure scale
  // 気圧自動スケール
  // ====================================================
  const validPressure = lastPressure.filter(v => v !== null);

  const pMin = Math.min(...validPressure);
  const pMax = Math.max(...validPressure);

  const pressureMax = pMax.toFixed(1);
  const pressureMin = pMin.toFixed(1);

  // 少し余裕を持たせる
  const graphMin = Math.floor(pMin - 1);
  const graphMax = Math.ceil(pMax + 1);


  // Create pressure chart
  // 気圧グラフ作成
  weatherChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: lastLabels,
      datasets: [
        {
          // Pressure data
          // 気圧データ
          label: "気圧",
          data: lastPressure,

          // Line and point color
          // 線と点の色
          borderColor: "#ffcd56",
          backgroundColor: "#ffcd56",

          borderWidth: 2,
          tension: 0,
          yAxisID: "y",

          // Show points only every hour on desktop
          // デスクトップでは1時間ごとだけ点を表示
          pointRadius: function(context) {

            const label = context.chart.data.labels[context.dataIndex];

            // Hide all points on mobile
            // モバイルは全部非表示
            if (window.innerWidth <= 600) {
              return 0;
            }

            // Show point every hour
            // 1時間ごとだけ点を表示
            if (label.endsWith(":00")) {
              return 4;
            }

            // No point
            // 点なし
            return 0;
          },
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      spanGaps: false,

      plugins: {
      
        maxMinLabel: {
          maxValue: pressureMax,
          minValue: pressureMin,
          unit: "hPa",
          color: "#ffcd56"
        },
            
        legend: {

          labels: {
            color: "white"
          }
        },
      
        title: {
          display: false
        }
      },

      scales: {
        x: {
          ticks: {
            color: "white",
            autoSkip: false,

            // Show X-axis labels only every hour
            // X軸ラベルは1時間ごとのみ表示
            callback: function(value, index) {
            
              const label = this.getLabelForValue(value);
            
              // Mobile: show labels every 2 hours
              // スマホでは2時間おきに表示
              if (window.innerWidth <= 600) {
                const hour = parseInt(label.substring(0, 2), 10);
            
                if (label.endsWith(":00") && hour % 2 === 0) {
                  return label;
                }
            
                return "";
              }
            
              // Desktop: show labels every hour
              // PCでは1時間おきに表示
              if (label.endsWith(":00")) {
                return label;
              }
            
              return "";
            }
          },

          // Show grid lines only every hour
          // グリッド線は1時間ごとのみ表示
          grid: {
            color: function(context) {
              const label = context.chart.data.labels[context.index];

              if (label && label.endsWith(":00")) {
                return "#555";
              }

              return "rgba(0,0,0,0)";
            }
          }
        },

        // Left Y-axis
        // 左Y軸
        y: {
          position: "left",
          min: graphMin,
          max: graphMax,
          ticks: {
            color: "white"
          },
          grid: {
            color: "#555"
          }
        },

        // Right Y-axis
        // 右Y軸
        y1: {
          position: "right",
          min: graphMin,
          max: graphMax,
          ticks: {
            color: "white"
          },
          grid: {
            drawOnChartArea: false
          }
        }
      }
    }
  });
}

// ============================================================
// Schedule history graph update
// 履歴グラフ更新スケジュール
// ------------------------------------------------------------
// Updates the graph every 10 minutes
// グラフを10分ごとに更新する
//
// The update is delayed slightly after the 10-minute boundary
// so that the server has enough time to write history.csv.
// 10分境界の直後ではなく少し遅らせて読み込むことで、
// サーバー側の history.csv 書き込み完了を待つ
// ============================================================
function scheduleHistoryUpdate() {

  // ==========================================================
  // Current time
  // 現在時刻
  // ==========================================================
  const now = new Date();

  // Create next update time based on current time
  // 現在時刻を基準に次回更新時刻を作成
  const next = new Date(now);


  // ==========================================================
  // Reset seconds and milliseconds
  // 秒とミリ秒を0にする
  // ==========================================================
  next.setSeconds(0);
  next.setMilliseconds(0);


  // ==========================================================
  // Calculate next 10-minute boundary
  // 次の10分境界を計算
  // ----------------------------------------------------------
  // Example:
  // 例:
  //
  // 12:03 -> 12:10
  // 12:17 -> 12:20
  // 12:58 -> 13:00
  // ==========================================================
  const m = now.getMinutes();

  const nextMin = Math.floor(m / 10) * 10 + 10;


  // ==========================================================
  // Handle hour rollover
  // 時間繰り上がり処理
  // ==========================================================
  if (nextMin >= 60) {

    next.setHours(now.getHours() + 1);

    next.setMinutes(0);

  } else {

    next.setMinutes(nextMin);
  }


  // ==========================================================
  // Delay after 10-minute boundary
  // 10分境界後の遅延
  // ----------------------------------------------------------
  // Current setting: 10 seconds after boundary
  // 現在設定: 10分境界から10秒後
  //
  // Example:
  // 例:
  //
  // 12:10:10
  // 12:20:10
  //
  // NOTE:
  // The old comment said 70 seconds, but this code uses 10000 ms.
  // 以前のコメントは70秒でしたが、このコードでは10000ms = 10秒です。
  // ==========================================================
  next.setTime(next.getTime() + 10000);


  // ==========================================================
  // Calculate delay time until next update
  // 次回更新までの待ち時間を計算
  // ==========================================================
  const delay = next.getTime() - now.getTime();


  // ==========================================================
  // Execute update after delay
  // 指定時間後に更新実行
  // ----------------------------------------------------------
  // After updating, schedule the next update again
  // 更新後、次回更新を再スケジュールする
  // ==========================================================
  setTimeout(() => {

    loadHistory();

    scheduleHistoryUpdate();

  }, delay);
}
